<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>محفظتي برو | Mahfazty Pro - إدارة مالية ذكية</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/60/60484.png">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- React + Tailwind + jsPDF -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Tajawal', 'sans-serif'] } } }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-slideUp { animation: slideUp 0.3s ease forwards; }
        .animate-slideIn { animation: slideIn 0.4s ease forwards; }
        .toast-notification { position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; z-index: 9999; animation: slideIn 0.3s ease; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 20px; }
            .print-report { display: block !important; }
            .transaction-item { break-inside: avoid; page-break-inside: avoid; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        
        /* تنسيق تقرير PDF */
        .pdf-report-container {
            direction: rtl;
            font-family: 'Tajawal', sans-serif;
            padding: 20px;
            background: white;
            color: black;
        }
        .pdf-report-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 10px;
        }
        .pdf-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: #f3f4f6;
            padding: 15px;
            border-radius: 12px;
        }
        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .pdf-table th, .pdf-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: right;
        }
        .pdf-table th {
            background: #4f46e5;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { jsPDF } = window.jspdf;

        // أيقونات SVG
        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62z"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        };

        // مكون الإشعار
        const ToastNotification = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3500);
                return () => clearTimeout(timer);
            }, [onClose]);
            
            const bgColor = type === 'income' ? 'bg-green-500' : type === 'expense' ? 'bg-red-500' : 'bg-indigo-500';
            return (
                <div className={`toast-notification ${bgColor} text-white rounded-2xl p-4 shadow-2xl flex items-center gap-3`}>
                    <span className="text-2xl">{type === 'income' ? '💰' : type === 'expense' ? '💸' : '📄'}</span>
                    <div className="flex-1"><p className="font-bold text-sm">{message.title}</p><p className="text-xs opacity-90">{message.body}</p></div>
                    <button onClick={onClose} className="text-white/70">✕</button>
                </div>
            );
        };

        // مكون محاكاة الرسائل
        const SmsSimulator = ({ onAddTransaction, onShowNotification }) => {
            const [smsText, setSmsText] = useState('');
            
            const parseSmsAndAdd = () => {
                const text = smsText;
                let amount = null;
                let isIncome = false;
                
                const amountMatch = text.match(/(\d+(?:,\d+)?(?:\.\d+)?)\s*(?:جنيه|EGP|ج\.م|LE)/i);
                if (amountMatch) amount = parseFloat(amountMatch[1].replace(/,/g, ''));
                
                if (text.includes('قبض') || text.includes('استلام') || text.includes('تحويل واصل') || text.includes('إيداع')) isIncome = true;
                else if (text.includes('صرف') || text.includes('دفع') || text.includes('سحب') || text.includes('خصم')) isIncome = false;
                
                if (amount && amount > 0) {
                    onAddTransaction({
                        id: Date.now(),
                        type: isIncome ? 'income' : 'expense',
                        amount: amount,
                        desc: text.substring(0, 45),
                        category: isIncome ? 'تحويل' : 'أخرى',
                        date: new Date().toISOString().split('T')[0],
                        time: new Date().toLocaleTimeString('ar-EG'),
                        auto: true
                    });
                    onShowNotification({
                        title: isIncome ? '💰 استلام مبلغ جديد' : '💸 تم صرف مبلغ',
                        body: `${amount.toLocaleString()} جنيه`,
                        type: isIncome ? 'income' : 'expense'
                    });
                    setSmsText('');
                } else {
                    alert('⚠️ لم يتم التعرف على مبلغ في النص');
                }
            };
            
            return (
                <div className="bg-gradient-to-r from-indigo-50 to-purple-50 dark:from-gray-800 dark:to-gray-700 rounded-2xl p-4 border border-indigo-200">
                    <h4 className="font-bold text-sm mb-2">📱 لصق رسالة البنك (InstaPay - فودافون كاش)</h4>
                    <textarea value={smsText} onChange={e => setSmsText(e.target.value)} placeholder="مثال: تم استلام 500 جنيه من InstaPay" className="w-full p-3 rounded-xl border dark:bg-gray-800 text-sm" rows="2"></textarea>
                    <button onClick={parseSmsAndAdd} className="mt-2 w-full bg-indigo-600 text-white py-2 rounded-xl font-bold text-sm">🤖 تحليل وإضافة تلقائي</button>
                </div>
            );
        };

        // المكون الرئيسي
        const App = () => {
            const [transactions, setTransactions] = useState(() => {
                try { return JSON.parse(localStorage.getItem('mahfazty_pro_data') || '[]'); } catch { return []; }
            });
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('mahfazty_theme') === 'dark');
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            const [manualTrans, setManualTrans] = useState({ type: 'expense', amount: '', desc: '' });
            
            // حفظ البيانات
            useEffect(() => localStorage.setItem('mahfazty_pro_data', JSON.stringify(transactions)), [transactions]);
            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('mahfazty_theme', darkMode ? 'dark' : 'light');
            }, [darkMode]);
            
            // طلب إذن الإشعارات
            useEffect(() => {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }, []);
            
            // إضافة معاملة
            const addTransaction = useCallback((newTrans) => {
                setTransactions(prev => [newTrans, ...prev]);
                setNotification({
                    title: newTrans.type === 'income' ? '💰 إيداع جديد' : '💸 خصم جديد',
                    body: `${newTrans.amount.toLocaleString()} جنيه - ${newTrans.desc}`,
                    type: newTrans.type
                });
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(newTrans.type === 'income' ? '💰 إيداع' : '💸 خصم', {
                        body: `${newTrans.amount.toLocaleString()} جنيه`,
                        icon: 'https://cdn-icons-png.flaticon.com/512/60/60484.png'
                    });
                }
            }, []);
            
            // حذف معاملة مع تأكيد
            const deleteTransaction = (id, desc, amount) => {
                if (window.confirm(`⚠️ هل أنت متأكد من حذف المعاملة:\n${desc}\nالمبلغ: ${amount.toLocaleString()} جنيه؟`)) {
                    setTransactions(prev => prev.filter(t => t.id !== id));
                    setNotification({
                        title: '🗑️ تم الحذف',
                        body: `تم حذف المعاملة: ${desc}`,
                        type: 'info'
                    });
                }
            };
            
            // إضافة يدوية
            const handleManualAdd = () => {
                if (!manualTrans.amount || !manualTrans.desc) return;
                addTransaction({
                    id: Date.now(),
                    type: manualTrans.type,
                    amount: parseFloat(manualTrans.amount),
                    desc: manualTrans.desc,
                    category: manualTrans.type === 'income' ? 'تحويل' : 'أخرى',
                    date: new Date().toISOString().split('T')[0],
                    time: new Date().toLocaleTimeString('ar-EG'),
                    auto: false
                });
                setManualTrans({ type: manualTrans.type, amount: '', desc: '' });
            };
            
            // تصدير PDF
            const exportToPDF = async () => {
                const stats = {
                    income: transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0),
                    expense: transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0),
                    balance: transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0) - 
                              transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0)
                };
                
                // إنشاء عنصر HTML للتقرير
                const reportDiv = document.createElement('div');
                reportDiv.className = 'pdf-report-container';
                reportDiv.innerHTML = `
                    <div class="pdf-report-header">
                        <h1 style="color: #4f46e5; margin:0;">📊 محفظتي برو</h1>
                        <h3>تقرير المعاملات المالية</h3>
                        <p>تاريخ التقرير: ${new Date().toLocaleDateString('ar-EG')}</p>
                    </div>
                    <div class="pdf-stats">
                        <div><strong>💰 الرصيد</strong><br>${stats.balance.toLocaleString()} ج.م</div>
                        <div><strong>📈 إجمالي الدخل</strong><br>+${stats.income.toLocaleString()} ج.م</div>
                        <div><strong>📉 إجمالي المصروفات</strong><br>-${stats.expense.toLocaleString()} ج.م</div>
                        <div><strong>📋 عدد المعاملات</strong><br>${transactions.length}</div>
                    </div>
                    <table class="pdf-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>التاريخ</th>
                                <th>الوصف</th>
                                <th>النوع</th>
                                <th>المبلغ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${transactions.slice(0, 50).map((t, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${t.date}</td>
                                    <td>${t.desc}</td>
                                    <td>${t.type === 'income' ? '💰 دخل' : '💸 مصروف'}</td>
                                    <td style="color: ${t.type === 'income' ? 'green' : 'red'}">${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()} ج.م</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top: 20px; text-align: center; font-size: 12px; color: #666;">
                        تم إنشاء هذا التقرير بواسطة محفظتي برو - إدارة مالية ذكية
                    </div>
                `;
                
                document.body.appendChild(reportDiv);
                
                try {
                    const canvas = await html2canvas(reportDiv, { scale: 2, backgroundColor: '#ffffff' });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 190;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                    pdf.save(`تقرير_محفظتي_${new Date().toISOString().slice(0, 10)}.pdf`);
                    
                    setNotification({
                        title: '📄 تم التصدير',
                        body: 'تم حفظ التقرير بنجاح كملف PDF',
                        type: 'info'
                    });
                } catch (error) {
                    console.error('PDF error:', error);
                    alert('حدث خطأ في إنشاء PDF، يمكنك استخدام طباعة الصفحة');
                } finally {
                    document.body.removeChild(reportDiv);
                }
            };
            
            // طباعة التقرير
            const printReport = () => {
                window.print();
            };
            
            // إحصائيات
            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
                return { income, expense, balance: income - expense };
            }, [transactions]);
            
            return (
                <div className="min-h-screen pb-24">
                    {notification && <ToastNotification message={notification} type={notification.type} onClose={() => setNotification(null)} />}
                    
                    {/* Header */}
                    <nav className="fixed w-full z-20 top-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-b shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <img src="https://cdn-icons-png.flaticon.com/512/8552/8552791.png" className="w-8 h-8" alt="logo" />
                                <span className="font-black text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">محفظتي برو</span>
                            </div>
                            <div className="flex items-center gap-2">
                                {/* أزرار التصدير */}
                                <button onClick={exportToPDF} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-red-600" title="تصدير PDF">
                                    <Icons.Download />
                                </button>
                                <button onClick={printReport} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-blue-600" title="طباعة">
                                    <Icons.Printer />
                                </button>
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full hover:bg-gray-100">
                                    {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                            </div>
                        </div>
                    </nav>
                    
                    <main className="pt-20 px-4 max-w-6xl mx-auto space-y-4">
                        {/* بطاقات الإحصائيات */}
                        <div className="grid grid-cols-3 gap-3">
                            <div className="bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl p-4 text-white">
                                <p className="text-xs opacity-80">الرصيد</p>
                                <p className="text-2xl font-bold" dir="ltr">{stats.balance.toLocaleString()} <span className="text-xs">ج.م</span></p>
                            </div>
                            <div className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow border-r-4 border-green-500">
                                <p className="text-xs text-green-600">الدخل</p>
                                <p className="text-xl font-bold text-green-600">+{stats.income.toLocaleString()}</p>
                            </div>
                            <div className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow border-r-4 border-red-500">
                                <p className="text-xs text-red-500">المصروفات</p>
                                <p className="text-xl font-bold text-red-500">-{stats.expense.toLocaleString()}</p>
                            </div>
                        </div>
                        
                        {/* محاكاة الرسائل */}
                        <SmsSimulator onAddTransaction={addTransaction} onShowNotification={(n) => setNotification(n)} />
                        
                        {/* إضافة يدوية */}
                        <div className="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm">
                            <h3 className="font-bold mb-3">✏️ إضافة معاملة يدوية</h3>
                            <div className="flex gap-2 mb-3">
                                <button onClick={() => setManualTrans({...manualTrans, type: 'expense'})} className={`flex-1 py-2 rounded-xl font-bold ${manualTrans.type === 'expense' ? 'bg-red-500 text-white' : 'bg-gray-100'}`}>مصروف</button>
                                <button onClick={() => setManualTrans({...manualTrans, type: 'income'})} className={`flex-1 py-2 rounded-xl font-bold ${manualTrans.type === 'income' ? 'bg-green-500 text-white' : 'bg-gray-100'}`}>دخل</button>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <input type="number" placeholder="المبلغ" value={manualTrans.amount} onChange={e => setManualTrans({...manualTrans, amount: e.target.value})} className="p-2 rounded-xl bg-gray-50 border-0" />
                                <input type="text" placeholder="الوصف" value={manualTrans.desc} onChange={e => setManualTrans({...manualTrans, desc: e.target.value})} className="p-2 rounded-xl bg-gray-50 border-0" />
                            </div>
                            <button onClick={handleManualAdd} className="w-full mt-3 bg-indigo-600 text-white py-2 rounded-xl font-bold">حفظ المعاملة</button>
                        </div>
                        
                        {/* قائمة المعاملات مع زر حذف */}
                        <div className="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm">
                            <h3 className="font-bold mb-3 flex items-center gap-2">📋 المعاملات <span className="text-sm text-gray-500">({transactions.length})</span></h3>
                            <div className="relative mb-3">
                                <Icons.Search />
                                <input type="text" placeholder="بحث..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-gray-50 rounded-full py-2 pr-10 pl-4 text-sm" />
                            </div>
                            <div className="space-y-2 max-h-[450px] overflow-y-auto">
                                {transactions.filter(t => t.desc.toLowerCase().includes(searchTerm.toLowerCase())).map(t => (
                                    <div key={t.id} className="transaction-item flex justify-between items-center p-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl hover:shadow transition">
                                        <div className="flex-1">
                                            <p className="font-medium text-sm">{t.desc}</p>
                                            <p className="text-[10px] text-gray-400">{t.date} {t.time}</p>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className={`font-bold ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}`} dir="ltr">
                                                {t.type === 'income' ? '+' : '-'}{t.amount.toLocaleString()}
                                            </span>
                                            {t.auto && <span className="text-[9px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded-full">تلقائي</span>}
                                            <button 
                                                onClick={() => deleteTransaction(t.id, t.desc, t.amount)}
                                                className="text-gray-400 hover:text-red-500 transition p-1"
                                                title="حذف المعاملة"
                                            >
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {transactions.length === 0 && (
                                    <div className="text-center py-10 text-gray-400">
                                        <p>📭 لا توجد معاملات</p>
                                        <p className="text-xs mt-1">جرب إضافة رسالة من InstaPay أو Vodafone Cash</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* ملخص سريع */}
                        {transactions.length > 0 && (
                            <div className="bg-indigo-50 dark:bg-indigo-900/30 rounded-xl p-3 text-center text-sm">
                                📊 إجمالي {transactions.length} معاملة | آخر تحديث: {transactions[0]?.date || 'لا توجد معاملات'}
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
